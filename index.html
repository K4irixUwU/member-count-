<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
html,
body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent !important;
}

body {
    display: flex;
    align-items: center;
    justify-content: center;
}

* {
    box-sizing: border-box;
}

.shirokuro-container {
    width: 220px;
    height: 86px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        Helvetica, Arial, sans-serif;
}

.shirokuro-card {
    width: 220px;
    height: 86px;
    padding: 14px;

    background:
        radial-gradient(circle at top,
        #2b2b2f 0%,
        #141418 55%,
        #0b0b0d 100%);

    border-radius: 22px;

    border: 1px solid rgba(255,255,255,0.07);

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 10px 30px rgba(0,0,0,0.55);

    overflow: hidden;
}

.flex-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.title {
    font-size: 14px;
    font-weight: 700;
    color: #f5f5f5;
    letter-spacing: 0.4px;
}

.white-text {
    color: #ffffff;
    font-weight: 700;
}

.silver-text {
    color: #b7b7bb;
    font-weight: 700;
}

.muted-text {
    color: #7f7f86;
    font-weight: 700;
}

.spacer {
    height: 14px;
}

/* TRACK */
.progress-track {
    position: relative;
    width: 100%;
    height: 13px;

    border-radius: 999px;

    background:
        linear-gradient(
            180deg,
            rgba(255,255,255,0.04),
            rgba(255,255,255,0.015)
        );

    border: 1px solid rgba(255,255,255,0.05);

    overflow: hidden;

    box-shadow:
        inset 0 2px 5px rgba(0,0,0,0.6);
}

/* THIS FIXES THE WHITE PART */
.progress-track::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;

    background:
        linear-gradient(
            90deg,
            rgba(255,255,255,0.02),
            transparent 40%,
            transparent
        );

    pointer-events: none;
}

.progress-fill {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 0%;

    border-radius: 999px;

    background:
        linear-gradient(
            90deg,
            #ffffff 0%,
            #d8d8d8 45%,
            #8a8a8a 100%
        );

    box-shadow:
        0 0 10px rgba(255,255,255,0.10);

    transition: width 1.4s cubic-bezier(0.4,0,0.2,1);
}
</style>
</head>

<body>

<div class="shirokuro-container">

    <div class="shirokuro-card">

        <div class="flex-row">
            <div class="title">SHIROKURO</div>

            <div>
                <span class="white-text" id="current-count">...</span>
                <span class="muted-text"> / </span>
                <span class="silver-text">2000</span>
            </div>
        </div>

        <div class="spacer"></div>

        <div class="progress-track">
            <div class="progress-fill" id="progress-bar"></div>
        </div>

        <div class="spacer" style="height:10px;"></div>

        <div class="flex-row">
            <div class="muted-text">0</div>
            <div class="silver-text">2000</div>
        </div>

    </div>

</div>

<script>
async function updateShirokuroProgress() {

    const clubSlug = "shirokuro";
    const goal = 2000;

    const currentCountEl =
        document.getElementById("current-count");

    const progressBarEl =
        document.getElementById("progress-bar");

    try {

        const response = await fetch(
            `https://api.chess.com/pub/club/${clubSlug}`
        );

        if (!response.ok)
            throw new Error("API Error");

        const data = await response.json();

        const count = data.members_count;

        currentCountEl.innerText =
            count.toLocaleString();

        let percentage =
            (count / goal) * 100;

        percentage = Math.max(
            0,
            Math.min(100, percentage)
        );

        requestAnimationFrame(() => {
            progressBarEl.style.width =
                percentage + "%";
        });

    } catch (error) {

        console.error(error);

        currentCountEl.innerText = "Error";
    }
}

updateShirokuroProgress();
</script>

</body>
</html>
