<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<style>
html,
body{
    margin:0;
    padding:0;
    background:transparent;
    overflow:hidden;
}

/* REMOVE WHITE EDGES */
iframe,
div,
*{
    box-sizing:border-box;
}

.shirokuro-card{
    width:220px;
    height:86px;

    padding:14px;

    border-radius:22px;

    background:#0d0d10;

    border:1px solid rgba(255,255,255,.06);

    overflow:hidden;

    font-family:-apple-system,BlinkMacSystemFont,
    "Segoe UI",Helvetica,Arial,sans-serif;

    color:#fff;

    /* THIS FIXES THE WHITE CORNERS */
    isolation:isolate;
}

/* DARK OVERLAY TO KILL WHITE GLOW */
.shirokuro-card::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:22px;

    background:
    radial-gradient(circle at top,
    #2b2b2f 0%,
    #141418 58%,
    #0b0b0d 100%);

    z-index:-1;
}

.flex{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.title{
    font-size:14px;
    font-weight:700;
    letter-spacing:.3px;
}

.count{
    font-size:14px;
    font-weight:700;
}

.dim{
    color:#8d8d93;
}

.spacer{
    height:14px;
}

.track{
    width:100%;
    height:13px;

    border-radius:999px;

    background:#121216;

    overflow:hidden;

    position:relative;

    border:1px solid rgba(255,255,255,.03);

    /* THIS IS THE REAL FIX */
    box-shadow:
    inset 0 0 0 999px rgba(0,0,0,.18),
    inset 0 2px 5px rgba(0,0,0,.7);
}

.fill{
    position:absolute;
    top:0;
    left:0;

    width:0%;
    height:100%;

    border-radius:999px;

    background:
    linear-gradient(
    90deg,
    #ffffff 0%,
    #d8d8d8 50%,
    #8a8a8a 100%
    );

    /* REMOVE WHITE OUTER GLOW */
    box-shadow:none;

    transition:width 1.2s ease;
}
</style>
</head>

<body>

<div class="shirokuro-card">

    <div class="flex">
        <div class="title">SHIROKURO</div>

        <div class="count">
            <span id="count">...</span>
            <span class="dim"> / </span>
            <span class="dim">2000</span>
        </div>
    </div>

    <div class="spacer"></div>

    <div class="track">
        <div class="fill" id="bar"></div>
    </div>

    <div style="height:10px;"></div>

    <div class="flex">
        <div class="dim">0</div>
        <div class="dim">2000</div>
    </div>

</div>

<script>
async function loadCount(){

    const goal = 2000;

    try{

        const res = await fetch(
            "https://api.chess.com/pub/club/shirokuro"
        );

        const data = await res.json();

        const count = data.members_count;

        document.getElementById("count")
        .innerText = count.toLocaleString();

        const percent =
        Math.min((count / goal) * 100,100);

        requestAnimationFrame(()=>{
            document.getElementById("bar")
            .style.width = percent + "%";
        });

    }catch(e){

        document.getElementById("count")
        .innerText = "Error";
    }
}

loadCount();
</script>

</body>
</html>
