<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<style>
html,
body{
    margin:0;
    padding:0;
    background:transparent;
    overflow:hidden;

    /* MATCHES IFRAME */
    width:256px;
    height:140px;
}

*{
    box-sizing:border-box;
}

body{
    display:flex;
    align-items:center;
    justify-content:center;
}

.shirokuro-card{
    width:256px;
    height:140px;

    padding:16px;

    border-radius:24px;

    background:
    radial-gradient(circle at top,
    #2b2b2f 0%,
    #141418 55%,
    #09090b 100%);

    border:1px solid rgba(255,255,255,.06);

    font-family:-apple-system,BlinkMacSystemFont,
    "Segoe UI",Helvetica,Arial,sans-serif;

    color:#fff;

    overflow:hidden;

    box-shadow:
    0 12px 32px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.04);
}

.flex{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.title{
    font-size:15px;
    font-weight:700;
    letter-spacing:.2px;
}

.count{
    font-size:15px;
    font-weight:700;
}

.dim{
    color:#8e8e95;
}

.spacer{
    height:16px;
}

.track{
    width:100%;
    height:14px;

    border-radius:999px;

    overflow:hidden;

    background:#0b0b0d;

    border:1px solid rgba(255,255,255,.04);

    position:relative;

    box-shadow:
    inset 0 2px 6px rgba(0,0,0,.6);
}

.fill{
    position:absolute;
    top:0;
    left:0;

    height:100%;
    width:0%;

    border-radius:999px;

    background:
    linear-gradient(
    90deg,
    #ffffff 0%,
    #d7d7d7 50%,
    #8d8d8d 100%
    );

    transition:width 1s ease;
}

.bottom{
    margin-top:14px;
}
</style>
</head>

<body>

<div class="shirokuro-card">

    <div class="flex">
        <div class="title">SHIROKURO</div>

        <div class="count">
            <span id="count">...</span>
            <span class="dim"> / </span>
            <span class="dim">2000</span>
        </div>
    </div>

    <div class="spacer"></div>

    <div class="track">
        <div class="fill" id="bar"></div>
    </div>

    <div class="bottom flex">
        <div class="dim">0</div>
        <div class="dim">2000</div>
    </div>

</div>

<script>
async function loadCount(){

    const goal = 2000;

    try{

        const response = await fetch(
            "https://api.chess.com/pub/club/shirokuro"
        );

        const data = await response.json();

        const count = data.members_count;

        document.getElementById("count")
        .innerText = count.toLocaleString();

        const percent =
        Math.min((count / goal) * 100,100);

        document.getElementById("bar")
        .style.width = percent + "%";

    }catch(err){

        document.getElementById("count")
        .innerText = "Error";
    }
}

loadCount();
</script>

</body>
</html>
